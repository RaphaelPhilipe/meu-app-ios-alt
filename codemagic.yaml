workflows:
  sigev_ios_cordova:
    name: SIGEV iOS Cordova
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: RPGC Systems
    environment:
      vars:
        BUNDLE_ID: "com.sigevalt.mobile"
      node: 20.11.1
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: $BUNDLE_ID
    scripts:
      - name: Install Cordova dependencies
        script: |
          npm install
      - name: Add iOS platform
        script: |
          npx cordova platform add ios@7.1.1 || npx cordova platform ls
      - name: Prepare Cordova app
        script: |
          npx cordova prepare ios
      - name: Detect iOS project files
        script: |
          IOS_DIR="$CM_BUILD_DIR/platforms/ios"
          WORKSPACE_PATH="$(find "$IOS_DIR" -maxdepth 1 -name '*.xcworkspace' | head -n 1)"
          if [ -z "$WORKSPACE_PATH" ]; then
            echo "Nenhum .xcworkspace encontrado em $IOS_DIR"
            exit 1
          fi

          SCHEME_NAME="$(basename "$WORKSPACE_PATH" .xcworkspace)"
          INFO_PLIST_PATH="$(find "$IOS_DIR" -path '*/CordovaLib/*' -prune -o -name '*-Info.plist' -print | head -n 1)"
          if [ -z "$INFO_PLIST_PATH" ]; then
            echo "Nenhum *-Info.plist encontrado em $IOS_DIR"
            exit 1
          fi

          echo "WORKSPACE_PATH=$WORKSPACE_PATH" >> "$CM_ENV"
          echo "SCHEME_NAME=$SCHEME_NAME" >> "$CM_ENV"
          echo "INFO_PLIST_PATH=$INFO_PLIST_PATH" >> "$CM_ENV"
          echo "Workspace detectado: $WORKSPACE_PATH"
          echo "Scheme detectado: $SCHEME_NAME"
          echo "Info.plist detectado: $INFO_PLIST_PATH"
      - name: Set unique iOS build number
        script: |
          BUILD_NUMBER="$(date +%Y%m%d%H%M%S)"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" "$INFO_PLIST_PATH" || \
          /usr/libexec/PlistBuddy -c "Add :CFBundleVersion string $BUILD_NUMBER" "$INFO_PLIST_PATH"
          /usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" "$INFO_PLIST_PATH"
          /usr/libexec/PlistBuddy -c "Print :CFBundleVersion" "$INFO_PLIST_PATH"
      - name: Apply code signing to Xcode project
        script: |
          cd "$CM_BUILD_DIR/platforms/ios"
          xcode-project use-profiles
      - name: Build IPA with xcode-project
        script: |
          xcode-project build-ipa \
            --workspace "$WORKSPACE_PATH" \
            --scheme "$SCHEME_NAME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Internal Testers
        # Configure a integracao App Store Connect no workflow pelo painel do Codemagic.
        # Se preferir API Key manual, use as variaveis seguras:
        # APP_STORE_CONNECT_ISSUER_ID
        # APP_STORE_CONNECT_KEY_IDENTIFIER
        # APP_STORE_CONNECT_PRIVATE_KEY
