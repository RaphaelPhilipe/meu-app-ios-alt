workflows:
  sigevalt_ios_native:
    name: SIGEV ALT Native iOS
    max_build_duration: 90
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: RPGC Systems
    environment:
      node: 20.11.1
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "com.sigevalt.mobile"
        XCODE_SCHEME: "SIGEV ALT"
      ios_signing:
        distribution_type: app_store
        bundle_identifier: $BUNDLE_ID
    scripts:
      - name: Install dependencies
        script: |
          npm ci
      - name: Generate native iOS project
        script: |
          npx expo prebuild --platform ios --clean --non-interactive
      - name: Install CocoaPods
        script: |
          cd ios
          pod install
      - name: Build IPA
        script: |
          WORKSPACE_PATH=$(find "$CM_BUILD_DIR/ios" -maxdepth 1 -name "*.xcworkspace" | head -n 1)
          if [ -z "$WORKSPACE_PATH" ]; then
            echo "No .xcworkspace found under ios/"
            exit 1
          fi

          echo "Using workspace: $WORKSPACE_PATH"

          AVAILABLE_SCHEMES=$(xcodebuild -list -json -workspace "$WORKSPACE_PATH" | python3 -c "import sys, json; data=json.load(sys.stdin); print('\n'.join(data.get('workspace', {}).get('schemes', [])))")
          echo "Available schemes:"
          echo "$AVAILABLE_SCHEMES"

          if echo "$AVAILABLE_SCHEMES" | grep -Fxq "$XCODE_SCHEME"; then
            SELECTED_SCHEME="$XCODE_SCHEME"
          elif echo "$AVAILABLE_SCHEMES" | grep -Fxiq "SIGEVALT"; then
            SELECTED_SCHEME=$(echo "$AVAILABLE_SCHEMES" | grep -Fix "SIGEVALT" | head -n 1)
          elif echo "$AVAILABLE_SCHEMES" | grep -Fxiq "SIGEV ALT"; then
            SELECTED_SCHEME=$(echo "$AVAILABLE_SCHEMES" | grep -Fix "SIGEV ALT" | head -n 1)
          else
            SELECTED_SCHEME=$(echo "$AVAILABLE_SCHEMES" | grep -Ev '^(Pods-|boost$|React-|Expo|SocketRocket|Yoga|glog|fmt|hermes-engine|RCT-|ReactCodegen|ReactCommon|RNCAsyncStorage|RNGestureHandler|RNReanimated|RNScreens)' | head -n 1)
          fi

          if [ -z "$SELECTED_SCHEME" ]; then
            echo "No Xcode scheme found for workspace $WORKSPACE_PATH"
            exit 1
          fi

          echo "Using scheme: $SELECTED_SCHEME"

          xcode-project use-profiles

          EXPORT_OPTIONS_PLIST="/Users/builder/export_options.plist"
          if [ ! -f "$EXPORT_OPTIONS_PLIST" ]; then
            cat > "$EXPORT_OPTIONS_PLIST" <<EOF
          {
            "method": "app-store",
            "signingStyle": "automatic",
            "teamID": "${APP_STORE_CONNECT_TEAM_ID:-}",
            "uploadBitcode": false,
            "compileBitcode": false
          }
          EOF
            plutil -convert xml1 "$EXPORT_OPTIONS_PLIST"
          fi

          xcode-project build-ipa \
            --workspace "$WORKSPACE_PATH" \
            --scheme "$SELECTED_SCHEME" \
            --export-options-plist "$EXPORT_OPTIONS_PLIST"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Internal Testers
