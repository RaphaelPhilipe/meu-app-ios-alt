workflows:
  sigevalt_ios_native:
    name: SIGEV ALT Native iOS
    max_build_duration: 90
    instance_type: mac_mini_m2
    environment:
      node: 20.11.1
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "com.sigevalt.mobile"
        XCODE_WORKSPACE: "ios/SIGEV ALT.xcworkspace"
        XCODE_SCHEME: "SIGEV ALT"
      ios_signing:
        distribution_type: app_store
        bundle_identifier: $BUNDLE_ID
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Generate native iOS project
        script: |
          npx expo prebuild --platform ios --clean --non-interactive
      - name: Install CocoaPods
        script: |
          cd ios
          pod install
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "$CM_BUILD_DIR/$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Internal Testers
