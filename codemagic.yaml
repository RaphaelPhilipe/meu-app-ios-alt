workflows:
  sigev_ios_cordova:
    name: SIGEV iOS Cordova
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: RPGC Systems
    environment:
      vars:
        XCODE_WORKSPACE: "platforms/ios/SIGEV Mobile.xcworkspace"
        XCODE_SCHEME: "SIGEV Mobile"
        BUNDLE_ID: "com.sigevalt.mobile"
      node: 20.11.1
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: $BUNDLE_ID
    scripts:
      - name: Install Cordova dependencies
        script: |
          npm install
      - name: Add iOS platform
        script: |
          npx cordova platform add ios@7.1.1 || npx cordova platform ls
      - name: Prepare Cordova app
        script: |
          npx cordova prepare ios
      - name: Set unique iOS build number
        script: |
          BUILD_NUMBER="${CM_BUILD_ID}"
          INFO_PLIST="$CM_BUILD_DIR/platforms/ios/SIGEV Mobile/SIGEV Mobile-Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" "$INFO_PLIST"
          /usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" "$INFO_PLIST"
          /usr/libexec/PlistBuddy -c "Print :CFBundleVersion" "$INFO_PLIST"
      - name: Apply code signing to Xcode project
        script: |
          cd "$CM_BUILD_DIR/platforms/ios"
          xcode-project use-profiles
      - name: Build IPA with xcode-project
        script: |
          xcode-project build-ipa \
            --workspace "$CM_BUILD_DIR/$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Internal Testers
        # Configure a integracao App Store Connect no workflow pelo painel do Codemagic.
        # Se preferir API Key manual, use as variaveis seguras:
        # APP_STORE_CONNECT_ISSUER_ID
        # APP_STORE_CONNECT_KEY_IDENTIFIER
        # APP_STORE_CONNECT_PRIVATE_KEY
